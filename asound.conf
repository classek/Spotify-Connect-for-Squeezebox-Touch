# /etc/asound.conf — Squeezebox Touch ALSA config for librespot
#
# hw:1 = AKM4420 DAC (card "fab4")
# Supports: S24_LE, 44100 Hz, stereo
# jive_alsa uses plughw:2,0 and default — no conflict

pcm.librespot {
    type plug
    slave {
        pcm "hw:1,0"
        format S24_LE
        rate 44100
    }
}
